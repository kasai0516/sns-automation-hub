name: SNS Auto Post (Publish)

on:
  schedule:
    # ===== GlobeSNS × X: 1日3回 (JST: 08:00, 12:30, 20:00) =====
    - cron: '0 23 * * *'     # JST 08:00 = UTC 23:00 (前日)
    - cron: '30 3 * * *'     # JST 12:30 = UTC 03:30
    - cron: '0 11 * * *'     # JST 20:00 = UTC 11:00

    # ===== GlobeSNS × Threads: 1日3回 (JST: 08:30, 13:00, 20:30) =====
    - cron: '30 23 * * *'    # JST 08:30 = UTC 23:30 (前日)
    - cron: '0 4 * * *'      # JST 13:00 = UTC 04:00
    - cron: '30 11 * * *'    # JST 20:30 = UTC 11:30

  workflow_dispatch:
    inputs:
      account:
        description: 'Account profile ID (e.g. globesns-x, globesns-threads)'
        required: false
        default: 'globesns-x'
      confirm:
        description: 'Type "publish" to confirm'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'publish' || github.event_name == 'schedule'
    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # GlobeSNS × X credentials
      GLOBESNS_X_API_KEY: ${{ secrets.GLOBESNS_X_API_KEY }}
      GLOBESNS_X_API_SECRET: ${{ secrets.GLOBESNS_X_API_SECRET }}
      GLOBESNS_X_ACCESS_TOKEN: ${{ secrets.GLOBESNS_X_ACCESS_TOKEN }}
      GLOBESNS_X_ACCESS_SECRET: ${{ secrets.GLOBESNS_X_ACCESS_SECRET }}
      # GlobeSNS × Threads credentials
      GLOBESNS_THREADS_ACCESS_TOKEN: ${{ secrets.GLOBESNS_THREADS_ACCESS_TOKEN }}
      GLOBESNS_THREADS_USER_ID: ${{ secrets.GLOBESNS_THREADS_USER_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Determine account from schedule
        id: account
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            CRON="${{ github.event.schedule }}"
            # X schedules: 23:00, 03:30, 11:00 UTC
            if [ "$CRON" == "0 23 * * *" ] || [ "$CRON" == "30 3 * * *" ] || [ "$CRON" == "0 11 * * *" ]; then
              echo "id=globesns-x" >> $GITHUB_OUTPUT
            # Threads schedules: 23:30, 04:00, 11:30 UTC
            elif [ "$CRON" == "30 23 * * *" ] || [ "$CRON" == "0 4 * * *" ] || [ "$CRON" == "30 11 * * *" ]; then
              echo "id=globesns-threads" >> $GITHUB_OUTPUT
            else
              echo "id=globesns-x" >> $GITHUB_OUTPUT
            fi
          elif [ -n "${{ github.event.inputs.account }}" ]; then
            echo "id=${{ github.event.inputs.account }}" >> $GITHUB_OUTPUT
          else
            echo "id=globesns-x" >> $GITHUB_OUTPUT
          fi

      - name: Generate and publish post
        id: publish
        run: npx tsx src/cli/index.ts post --account ${{ steps.account.outputs.id }} --mode publish

      - name: Commit history
        if: success()
        run: |
          git config user.name "SNS Bot"
          git config user.email "bot@example.com"
          git add -f data/history.json || true
          git diff --cached --quiet || git commit -m "📝 Post history: ${{ steps.account.outputs.id }} $(date -u +'%Y-%m-%d %H:%M')"
          git push
