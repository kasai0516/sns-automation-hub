name: SNS Auto Post (Dry-Run)

on:
  schedule:
    # ===== Dry-run: X と Threads の Publish と同じ時刻に実行 =====
    # GlobeSNS × X: JST 07:00, 12:00, 20:00
    - cron: '0 22 * * *'   # JST 07:00 = UTC 22:00
    - cron: '0 3 * * *'    # JST 12:00 = UTC 03:00
    - cron: '0 11 * * *'   # JST 20:00 = UTC 11:00
    # GlobeSNS × Threads: JST 08:00, 13:00, 21:00
    - cron: '0 23 * * *'   # JST 08:00 = UTC 23:00
    - cron: '0 4 * * *'    # JST 13:00 = UTC 04:00
    - cron: '0 12 * * *'   # JST 21:00 = UTC 12:00

  workflow_dispatch:
    inputs:
      account:
        description: 'Account profile ID (e.g. globesns-x, globesns-threads)'
        required: false
        default: ''

jobs:
  dry-run:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Determine account from schedule
        id: account
        run: |
          if [ -n "${{ github.event.inputs.account }}" ]; then
            echo "id=${{ github.event.inputs.account }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            # X schedules: 22:00, 03:00, 11:00 UTC
            if [ "$CRON" == "0 22 * * *" ] || [ "$CRON" == "0 3 * * *" ] || [ "$CRON" == "0 11 * * *" ]; then
              echo "id=globesns-x" >> $GITHUB_OUTPUT
            # Threads schedules: 23:00, 04:00, 12:00 UTC
            elif [ "$CRON" == "0 23 * * *" ] || [ "$CRON" == "0 4 * * *" ] || [ "$CRON" == "0 12 * * *" ]; then
              echo "id=globesns-threads" >> $GITHUB_OUTPUT
            else
              echo "id=globesns-x" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run dry-run
        run: npx tsx src/cli/index.ts post --account ${{ steps.account.outputs.id }} --mode dry-run
